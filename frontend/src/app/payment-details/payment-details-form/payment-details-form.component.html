<div class="payment-container">

  <div class="credit-card shadow-lg">

    <div class="d-flex justify-content-between align-items-center">
      <span class="visa-text">VISA</span>
      <span class="chip"></span>
    </div>

    <div class="card-number">
      {{ service.formData.cardNumber || '**** **** **** 1234' }}
    </div>

    <div class="d-flex justify-content-between mt-4">
      <div>
        <small>CARD HOLDER</small>
        <div>{{ service.formData.cardOwnerName || 'YOUR NAME' }}</div>
      </div>

      <div>
        <small>EXPIRES</small>
        <div>{{ service.formData.expirationDate || 'MM/YY' }}</div>
      </div>
    </div>

  </div>

  <div class="card form-card shadow-lg">

    <div class="card-body p-4">

      <h3 class="fw-bold mb-4">Payment Details</h3>

      <form>

        <div class="mb-3">
          <label class="form-label">Card Owner Name</label>

          <input
            type="text"
            class="form-control custom-input"
            [(ngModel)]="service.formData.cardOwnerName"
            name="cardOwnerName">
        </div>

        <div class="mb-3">
          <label class="form-label">Card Number</label>

          <input
            type="text"
            class="form-control custom-input"
            [(ngModel)]="service.formData.cardNumber"
            name="cardNumber">
        </div>

        <div class="row">

          <div class="col">
            <label class="form-label">Expiry</label>

            <input
              type="text"
              class="form-control custom-input"
              [(ngModel)]="service.formData.expirationDate"
              name="expirationDate">
          </div>

          <div class="col">
            <label class="form-label">CVV</label>

            <input
              type="password"
              class="form-control custom-input"
              [(ngModel)]="service.formData.securityCode"
              name="securityCode">
          </div>

        </div>

     <!-- CHANGE the button to this: -->
      <!-- <button 
        class="btn payment-btn w-100 mt-4" 
        type="button"
        (click)="service.parentRef.payNow()">
        Pay Now
      </button> -->
        <button 
          class="btn payment-btn w-100 mt-4" 
          type="button"
          (click)="payNow()"
          [disabled]="isProcessing"
          novalidate>
          {{ isProcessing ? 'Processing...' : 'Pay Now' }}
        </button>
      </form>

    </div>

  </div>

</div>
